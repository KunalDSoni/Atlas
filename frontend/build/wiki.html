<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Wiki</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script>
        // Debug: catch Babel compilation errors
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.message, e.filename, e.lineno);
            if (document.getElementById('root') && !document.getElementById('root').innerHTML) {
                document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;font-family:sans-serif"><h2>Error loading Atlas Wiki</h2><p>' + e.message + '</p></div>';
            }
        });
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue:#0c66e4; --blue-dark:#0952cc; --blue-light:#e9f2ff; --blue-subtle:#579dff;
            --text:#172B4D; --text-subtle:#44546f; --text-muted:#626f86;
            --bg:#fff; --bg-neutral:#f7f8f9; --bg-neutral-subtle:#f1f2f4;
            --border:#dfe1e6; --border-bold:#091e4224;
            --green:#22a06b; --red:#de350b; --yellow:#e2b203; --purple:#6e5dc6;
            --nav-bg:#1868db; --nav-bg-dark:#0c3d8f;
            --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
            --sidebar-w:280px;
        }
        body { font-family:var(--font); color:var(--text); background:var(--bg); }
        button { font-family:var(--font); cursor:pointer; }
        input,textarea,select { font-family:var(--font); }
        a { text-decoration:none; color:inherit; }

        /* ===== TOP NAV (Confluence blue bar) ===== */
        .topnav {
            height:56px; background:var(--nav-bg); display:flex; align-items:center;
            padding:0 16px; gap:4px; position:sticky; top:0; z-index:100;
            box-shadow:0 1px 1px rgba(0,0,0,.14);
        }
        .topnav-left { display:flex; align-items:center; gap:4px; }
        .topnav-logo {
            display:flex; align-items:center; gap:6px; color:#fff; font-weight:700;
            font-size:15px; padding:6px 10px; border-radius:4px; cursor:pointer; letter-spacing:-.2px;
        }
        .topnav-logo:hover { background:rgba(255,255,255,.12); }
        .topnav-logo svg { width:24px; height:24px; }
        .topnav-btn {
            color:rgba(255,255,255,.9); font-size:14px; font-weight:500; border:none;
            background:none; padding:6px 12px; border-radius:4px; white-space:nowrap;
            display:flex; align-items:center; gap:4px;
        }
        .topnav-btn:hover { background:rgba(255,255,255,.12); color:#fff; }
        .topnav-btn svg { width:16px; height:16px; }
        .topnav-center { flex:1; display:flex; justify-content:center; }
        .topnav-search {
            width:100%; max-width:460px; position:relative;
        }
        .topnav-search input {
            width:100%; padding:7px 12px 7px 34px; border-radius:6px; border:none;
            background:rgba(255,255,255,.18); color:#fff; font-size:14px;
            transition:background .2s;
        }
        .topnav-search input::placeholder { color:rgba(255,255,255,.55); }
        .topnav-search input:focus { background:rgba(255,255,255,.28); outline:none; }
        .topnav-search-icon {
            position:absolute; left:10px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.55);
        }
        .topnav-right { display:flex; align-items:center; gap:6px; margin-left:auto; }
        .topnav-create {
            background:#fff; color:var(--blue); border:none; padding:6px 14px; border-radius:4px;
            font-size:14px; font-weight:600; display:flex; align-items:center; gap:4px;
        }
        .topnav-create:hover { background:#f0f0f0; }
        .topnav-avatar {
            width:32px; height:32px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-weight:700; font-size:13px; color:#fff; cursor:pointer;
            border:2px solid rgba(255,255,255,.3);
        }

        /* ===== LAYOUT ===== */
        .app-layout { display:flex; height:calc(100vh - 56px); }

        /* ===== LEFT SIDEBAR ===== */
        .sidebar {
            width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--bg-neutral);
            border-right:1px solid var(--border); display:flex; flex-direction:column;
            overflow:hidden;
        }
        .sidebar-scroll { flex:1; overflow-y:auto; padding:12px 8px; }
        .sidebar-space-header {
            display:flex; align-items:center; gap:10px; padding:8px 12px;
            border-radius:6px; cursor:pointer; margin-bottom:4px;
        }
        .sidebar-space-header:hover { background:rgba(0,0,0,.04); }
        .sidebar-space-icon {
            width:28px; height:28px; border-radius:4px; display:flex; align-items:center;
            justify-content:center; font-size:14px; color:#fff; flex-shrink:0;
        }
        .sidebar-space-name { font-size:14px; font-weight:600; color:var(--text); }
        .sidebar-section { margin-top:8px; }
        .sidebar-section-label {
            font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
            color:var(--text-muted); padding:8px 12px 4px; user-select:none;
        }
        .sidebar-item {
            display:flex; align-items:center; gap:6px; padding:5px 8px 5px 12px;
            border-radius:4px; cursor:pointer; font-size:14px; color:var(--text-subtle);
            margin-bottom:1px; position:relative;
        }
        .sidebar-item:hover { background:rgba(0,0,0,.04); }
        .sidebar-item.active { background:var(--blue-light); color:var(--blue); font-weight:500; }
        .sidebar-item-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .sidebar-item-icon svg { width:16px; height:16px; }
        .sidebar-item-text { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* Page tree */
        .tree-item {
            display:flex; align-items:center; gap:2px; padding:4px 8px; padding-left:12px;
            border-radius:4px; cursor:pointer; font-size:13px; color:var(--text-subtle);
            margin-bottom:1px; min-height:30px;
        }
        .tree-item:hover { background:rgba(0,0,0,.04); }
        .tree-item.active { background:var(--blue-light); color:var(--blue); font-weight:500; }
        .tree-toggle {
            width:20px; height:20px; display:flex; align-items:center; justify-content:center;
            border-radius:4px; flex-shrink:0; color:var(--text-muted); font-size:10px;
        }
        .tree-toggle:hover { background:rgba(0,0,0,.06); }
        .tree-page-icon { width:18px; height:18px; flex-shrink:0; margin-right:4px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; }
        .tree-page-icon svg { width:16px; height:16px; }
        .tree-page-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tree-children { margin-left:16px; }
        .draft-badge {
            font-size:10px; font-weight:600; color:var(--text-muted); background:var(--bg-neutral-subtle);
            border:1px solid var(--border); padding:1px 6px; border-radius:3px; white-space:nowrap; margin-left:auto;
        }

        /* Jira link at bottom */
        .sidebar-footer {
            border-top:1px solid var(--border); padding:8px; flex-shrink:0;
        }
        .sidebar-jira-link {
            display:flex; align-items:center; gap:8px; padding:8px 12px;
            border-radius:4px; font-size:13px; color:var(--text-subtle); cursor:pointer;
        }
        .sidebar-jira-link:hover { background:rgba(0,0,0,.04); }
        .sidebar-jira-link svg { width:18px; height:18px; }
        .sidebar-create-btn {
            display:flex; align-items:center; gap:6px; padding:8px 12px;
            border-radius:4px; font-size:13px; color:var(--blue); cursor:pointer;
            border:1px dashed var(--border); background:none; width:100%; font-weight:500;
            margin-top:8px;
        }
        .sidebar-create-btn:hover { background:var(--blue-light); border-color:var(--blue); }
        .sidebar-create-btn svg { width:16px; height:16px; flex-shrink:0; }

        /* ===== MAIN CONTENT ===== */
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
        .main-scroll { flex:1; overflow-y:auto; }
        .main-content { max-width:860px; margin:0 auto; padding:32px 48px; width:100%; }

        /* ===== DASHBOARD ===== */
        .dash-section { margin-bottom:40px; }
        .dash-section-title {
            font-size:20px; font-weight:600; margin-bottom:16px; color:var(--text);
        }
        .dash-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
        .dash-card {
            border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer;
            transition:border-color .15s, box-shadow .15s; background:#fff;
        }
        .dash-card:hover { border-color:var(--blue); box-shadow:0 2px 8px rgba(12,102,228,.1); }
        .dash-card-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .dash-card-meta { font-size:12px; color:var(--text-muted); display:flex; gap:8px; }
        .space-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
        .space-card {
            border:1px solid var(--border); border-radius:8px; padding:20px; cursor:pointer;
            transition:border-color .15s, box-shadow .15s;
        }
        .space-card:hover { border-color:var(--blue); box-shadow:0 4px 12px rgba(0,0,0,.08); }
        .space-card-icon { width:40px; height:40px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:10px; color:#fff; }
        .space-card-name { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; }
        .space-card-desc { font-size:13px; color:var(--text-muted); line-height:1.5; margin-bottom:8px; }
        .space-card-count { font-size:12px; color:var(--text-muted); }

        /* ===== PAGE VIEW ===== */
        .breadcrumb { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted); margin-bottom:16px; flex-wrap:wrap; }
        .breadcrumb-link { color:var(--blue); cursor:pointer; }
        .breadcrumb-link:hover { text-decoration:underline; }
        .breadcrumb-sep { color:var(--text-muted); }
        .page-title-view { font-size:28px; font-weight:700; color:var(--text); margin-bottom:12px; line-height:1.25; }
        .page-meta-bar { display:flex; align-items:center; gap:16px; font-size:13px; color:var(--text-muted); flex-wrap:wrap; margin-bottom:8px; }
        .page-meta-author { display:flex; align-items:center; gap:6px; }
        .mini-avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:10px; color:#fff; flex-shrink:0; }
        .page-actions-bar { display:flex; align-items:center; gap:8px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }

        .btn {
            padding:6px 14px; border:1px solid var(--border); border-radius:4px; background:#fff;
            color:var(--text); font-size:13px; font-weight:500; display:inline-flex;
            align-items:center; gap:5px; white-space:nowrap; cursor:pointer;
            transition:background .15s, border-color .15s;
        }
        .btn:hover { background:var(--bg-neutral); border-color:var(--text-muted); }
        .btn-primary { background:var(--blue); color:#fff; border-color:var(--blue); }
        .btn-primary:hover { background:var(--blue-dark); border-color:var(--blue-dark); }
        .btn-subtle { border:none; background:none; color:var(--text-subtle); padding:6px 10px; }
        .btn-subtle:hover { background:var(--bg-neutral); }

        /* Page body content */
        .page-body { font-size:15px; line-height:1.7; color:var(--text); word-break:break-word; }
        .page-body h1 { font-size:24px; font-weight:700; margin:28px 0 12px; }
        .page-body h2 { font-size:20px; font-weight:700; margin:24px 0 8px; }
        .page-body h3 { font-size:16px; font-weight:700; margin:20px 0 8px; }
        .page-body p { margin-bottom:12px; }
        .page-body a { color:var(--blue); }
        .page-body a:hover { text-decoration:underline; }
        .page-body code { background:var(--bg-neutral); padding:2px 6px; border-radius:3px; font-family:'SFMono-Regular',Consolas,monospace; font-size:13px; }
        .page-body pre { background:var(--bg-neutral); padding:16px; border-radius:6px; overflow-x:auto; margin-bottom:12px; }
        .page-body ul,.page-body ol { margin-left:24px; margin-bottom:12px; }
        .page-body li { margin-bottom:4px; }
        .page-body blockquote { border-left:3px solid var(--blue-subtle); padding:8px 16px; margin:0 0 12px; background:var(--blue-light); border-radius:0 4px 4px 0; }
        .page-body table { width:100%; border-collapse:collapse; margin-bottom:16px; }
        .page-body th,.page-body td { border:1px solid var(--border); padding:8px 12px; text-align:left; font-size:14px; }
        .page-body th { background:var(--bg-neutral); font-weight:600; }
        .page-body img { max-width:100%; height:auto; border-radius:4px; }

        /* Labels */
        .labels { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
        .label-tag { background:var(--bg-neutral-subtle); color:var(--text-subtle); padding:3px 10px; border-radius:3px; font-size:12px; font-weight:500; }

        /* Comments */
        .comments-section { margin-top:40px; border-top:1px solid var(--border); padding-top:24px; }
        .comments-title { font-size:16px; font-weight:600; margin-bottom:16px; color:var(--text); }
        .comment-box { display:flex; gap:12px; margin-bottom:16px; }
        .comment-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:12px; flex-shrink:0; }
        .comment-content { flex:1; }
        .comment-header { display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:4px; }
        .comment-author { font-weight:600; color:var(--text); }
        .comment-time { color:var(--text-muted); }
        .comment-body { font-size:14px; color:var(--text); line-height:1.5; }
        .comment-input-area { margin-bottom:24px; }
        .comment-input-area textarea {
            width:100%; min-height:80px; padding:10px 12px; border:1px solid var(--border);
            border-radius:6px; font-size:14px; resize:vertical; color:var(--text);
        }
        .comment-input-area textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 2px rgba(12,102,228,.15); }

        /* ===== EDITOR ===== */
        .editor-topbar {
            height:52px; background:#fff; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between; padding:0 16px;
            flex-shrink:0;
        }
        .editor-topbar-left { display:flex; align-items:center; gap:8px; }
        .editor-topbar-right { display:flex; align-items:center; gap:8px; }
        .editor-saved-status { font-size:13px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
        .editor-saved-status svg { width:14px; height:14px; color:var(--green); }

        .editor-toolbar {
            display:flex; align-items:center; gap:2px; padding:6px 12px; border-bottom:1px solid var(--border);
            background:#fff; flex-wrap:wrap; flex-shrink:0;
        }
        .tb-btn {
            width:32px; height:32px; display:flex; align-items:center; justify-content:center;
            border:none; background:none; border-radius:4px; color:var(--text);
            font-size:14px; cursor:pointer; flex-shrink:0;
        }
        .tb-btn:hover { background:var(--bg-neutral); }
        .tb-btn.active { background:var(--blue-light); color:var(--blue); }
        .tb-btn svg { width:18px; height:18px; }
        .tb-sep { width:1px; height:24px; background:var(--border); margin:0 4px; flex-shrink:0; }
        .tb-select {
            padding:4px 8px; border:1px solid transparent; border-radius:4px; font-size:13px;
            color:var(--text); background:none; cursor:pointer; font-weight:500;
        }
        .tb-select:hover { background:var(--bg-neutral); border-color:var(--border); }
        .editor-title-input {
            font-size:28px; font-weight:700; border:none; outline:none; color:var(--text);
            padding:24px 48px 8px; width:100%; background:transparent;
        }
        .editor-title-input::placeholder { color:#b3bac5; }
        .editor-body {
            flex:1; padding:8px 48px 48px; font-size:15px; line-height:1.7; color:var(--text);
            outline:none; min-height:300px; overflow-y:auto;
        }
        .editor-body:empty::before {
            content:'Start writing or type / for commands...'; color:#b3bac5; font-style:normal;
        }

        /* ===== SEARCH RESULTS ===== */
        .search-result { padding:16px; border:1px solid var(--border); border-radius:8px; cursor:pointer; margin-bottom:8px; }
        .search-result:hover { border-color:var(--blue); background:rgba(12,102,228,.02); }
        .search-result-title { font-size:15px; font-weight:600; color:var(--blue); margin-bottom:4px; }
        .search-result-meta { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
        .search-result-snippet { font-size:13px; color:var(--text-subtle); line-height:1.5; }

        /* ===== PAGE LIST ===== */
        .page-list-item {
            display:flex; align-items:center; gap:10px; padding:10px 12px;
            border:1px solid var(--border); border-radius:6px; cursor:pointer; margin-bottom:6px;
        }
        .page-list-item:hover { border-color:var(--blue); background:rgba(12,102,228,.02); }
        .page-list-icon { color:var(--text-muted); flex-shrink:0; }
        .page-list-icon svg { width:18px; height:18px; }
        .page-list-info { flex:1; }
        .page-list-title { font-size:14px; font-weight:500; color:var(--text); }
        .page-list-meta { font-size:12px; color:var(--text-muted); }

        /* Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(9,30,66,.54); display:flex;
            align-items:center; justify-content:center; z-index:1000;
        }
        .modal { background:#fff; border-radius:8px; padding:28px; max-width:480px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,.2); }
        .modal-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:20px; }
        .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
        .form-group { margin-bottom:16px; }
        .form-label { font-size:13px; font-weight:600; color:var(--text-subtle); margin-bottom:6px; display:block; }
        .form-input {
            width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:4px;
            font-size:14px; color:var(--text);
        }
        .form-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 2px rgba(12,102,228,.15); }

        /* Version history */
        .version-grid { display:grid; grid-template-columns:260px 1fr; gap:24px; margin-top:20px; }
        .version-list-item {
            padding:10px 12px; border:1px solid var(--border); border-radius:6px; cursor:pointer; margin-bottom:6px;
        }
        .version-list-item:hover { border-color:var(--blue); }
        .version-list-item.active { border-color:var(--blue); background:var(--blue-light); }

        /* Empty / loading */
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
        .empty-state-icon { font-size:48px; margin-bottom:12px; }
        .empty-state-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:6px; }
        .loading-spinner { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--text-muted); font-size:14px; }

        /* Responsive */
        @media(max-width:1024px) {
            .sidebar { width:220px; min-width:220px; }
            .main-content { padding:24px 32px; }
        }
        @media(max-width:768px) {
            .app-layout { flex-direction:column; }
            .sidebar { width:100%; min-width:100%; border-right:none; border-bottom:1px solid var(--border); max-height:200px; }
            .main-content { padding:16px; }
            .topnav-search { display:none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const API = window.location.origin + '/api';

        // ===== SVG Icons =====
        const Icons = {
            confluence: () => (
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.1 17.6c-.2.3-.4.7-.5 1-.2.4 0 .9.4 1.1l4.6 2.7c.4.2.9.1 1.1-.3.1-.3.3-.6.5-.9 1.4-2.3 2.8-2.1 5.4-.8l4.5 2.2c.4.2.9 0 1.1-.4l2.2-4.8c.2-.4 0-.9-.4-1.1l-4.4-2.1c-4.8-2.4-8.9-2.2-14.5 3.4zm19.8-11.2c.2-.3.4-.7.5-1 .2-.4 0-.9-.4-1.1L17.4 1.6c-.4-.2-.9-.1-1.1.3-.1.3-.3.6-.5.9-1.4 2.3-2.8 2.1-5.4.8L6 1.4c-.4-.2-.9 0-1.1.4L2.7 6.6c-.2.4 0 .9.4 1.1l4.4 2.1c4.8 2.4 8.9 2.2 14.4-3.4z"/></svg>
            ),
            jira: () => (

            edit: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

            clock: () => (

            share: () => (

            ),
            home: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            ),
            content: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
            ),
            bold: () => <span style={{fontWeight:700,fontSize:15}}>B</span>,
            italic: () => <span style={{fontStyle:'italic',fontSize:15,fontFamily:'serif'}}>I</span>,
            underline: () => <span style={{textDecoration:'underline',fontSize:15}}>U</span>,
            listBullet: () => (

            ),
            alignLeft: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
            ),
            link: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            ),
            image: () => (

            mention: () => (
