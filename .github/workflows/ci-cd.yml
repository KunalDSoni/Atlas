# ===== Atlas CI/CD Pipeline =====
# Triggers: Push to main, Pull requests to main
# Steps: Lint → Test → Build Docker → Deploy to server

name: Atlas CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: atlas-app
  NODE_VERSION: '20'

jobs:
  # ─── Job 1: Run Tests ───
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm run test:backend

      - name: Run frontend tests
        working-directory: backend
        run: npm run test:frontend

  # ─── Job 2: Build & Push Docker Image ───
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.DOCKER_IMAGE }}:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Save Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > atlas-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: atlas-image.tar.gz
          retention-days: 1

  # ─── Job 3: Deploy to Server ───
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Create app directory if it doesn't exist
            mkdir -p /opt/atlas
            cd /opt/atlas

            # Pull latest code (or clone if first time)
            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone ${{ secrets.REPO_URL }} .
            fi

            # Build and restart with Docker Compose
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            # Wait for health check
            echo "Waiting for application to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "✓ Application is healthy!"
                exit 0
              fi
              echo "  Waiting... ($i/30)"
              sleep 2
            done
            echo "✗ Health check failed after 60 seconds"
            docker compose logs --tail=50 app
            exit 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Container Status ==="
            docker ps --filter "name=atlas" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== Disk Usage ==="
            docker system df
            echo ""
            echo "=== Recent Logs ==="
            docker compose -f /opt/atlas/docker-compose.yml logs --tail=5 app

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ secrets.SERVER_HOST }} failed!"
          echo "Check the deploy logs above for details."
