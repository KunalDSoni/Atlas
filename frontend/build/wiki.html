            ),
            emoji: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            ),
            hr: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/></svg>
            ),
            code: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            ),
            folder: () => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            ),
        };

        // ===== Helpers =====
        const getAuthHeaders = () => {
            try {
                const s = localStorage.getItem('atlas_user');
                if (!s) return { 'Content-Type': 'application/json' };
                const u = JSON.parse(s);
                return { 'x-user-id': String(u.id), 'x-user-role': u.role || '', 'x-auth-token': u.token || '', 'Content-Type': 'application/json' };
            } catch(e) { return { 'Content-Type': 'application/json' }; }
        };
        const getUser = () => {
            try {
                const s = localStorage.getItem('atlas_user');
                if (!s) return null;
                return JSON.parse(s);
            } catch(e) { return null; }
        };
        const avatarColors = { red:'#de350b', blue:'#0052cc', green:'#22a06b', purple:'#5e4db2', orange:'#974f0c', teal:'#00875a', yellow:'#b8621b' };
        const getAvatarColor = (c) => avatarColors[c] || avatarColors.blue;
        const fmtDate = (d) => { if(!d) return ''; const x=new Date(d); return x.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
        const fmtDateTime = (d) => { if(!d) return ''; const x=new Date(d); return x.toLocaleDateString()+' '+x.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); };

        // ===== API =====
        const api = {
            getSpaces: () => fetch(`${API}/wiki/spaces`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getSpace: (id) => fetch(`${API}/wiki/spaces/${id}`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getSpaceTree: (sid) => fetch(`${API}/wiki/spaces/${sid}/tree`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getSpacePages: (sid) => fetch(`${API}/wiki/spaces/${sid}/pages`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getPage: (id) => fetch(`${API}/wiki/pages/${id}`,{headers:getAuthHeaders()}).then(r=>r.json()),
            savePage: (id,d) => fetch(`${API}/wiki/pages/${id}`,{method:'PUT',headers:getAuthHeaders(),body:JSON.stringify(d)}).then(r=>r.json()),
            createPage: (sid,d) => fetch(`${API}/wiki/spaces/${sid}/pages`,{method:'POST',headers:getAuthHeaders(),body:JSON.stringify(d)}).then(r=>r.json()),
            getRecentPages: () => fetch(`${API}/wiki/pages/recent`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getStarredPages: () => fetch(`${API}/wiki/pages/starred`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getPageComments: (pid) => fetch(`${API}/wiki/pages/${pid}/comments`,{headers:getAuthHeaders()}).then(r=>r.json()),
            addComment: (pid,d) => fetch(`${API}/wiki/pages/${pid}/comments`,{method:'POST',headers:getAuthHeaders(),body:JSON.stringify(d)}).then(r=>r.json()),
            getPageVersions: (pid) => fetch(`${API}/wiki/pages/${pid}/versions`,{headers:getAuthHeaders()}).then(r=>r.json()),
            toggleStar: (d) => fetch(`${API}/wiki/star`,{method:'POST',headers:getAuthHeaders(),body:JSON.stringify(d)}).then(r=>r.json()),
            toggleLike: (pid) => fetch(`${API}/wiki/pages/${pid}/like`,{method:'POST',headers:getAuthHeaders()}).then(r=>r.json()),
            search: (q) => fetch(`${API}/wiki/search?q=${encodeURIComponent(q)}`,{headers:getAuthHeaders()}).then(r=>r.json()),
            getTemplates: () => fetch(`${API}/wiki/templates`,{headers:getAuthHeaders()}).then(r=>r.json()),
            createSpace: (d) => fetch(`${API}/wiki/spaces`,{method:'POST',headers:getAuthHeaders(),body:JSON.stringify(d)}).then(r=>r.json()),
        };

        // ===== TOP NAVIGATION =====
        function TopNav({ onNavigate, onSearch, spaces, onShowCreateSpace }) {
            const [sq, setSq] = useState('');
            const [showMenu, setShowMenu] = useState(false);
            const user = getUser();
            if (!user) return <div className="topnav"><div className="topnav-logo">Atlas Wiki</div></div>;
            return (
                <div className="topnav">
                    <div className="topnav-left">
                        <div className="topnav-logo" onClick={() => onNavigate('home')}>
                            <Icons.confluence /> Atlas Wiki
                        </div>
                        <button className="topnav-btn" onClick={() => onNavigate('home')}>For you</button>
                        <button className="topnav-btn" onClick={() => onNavigate('home')}>Spaces</button>
                    </div>
                    <div className="topnav-center">
                        <div className="topnav-search">
                            <div className="topnav-search-icon"><Icons.search /></div>
                            <input placeholder="Search Atlas Wiki" value={sq} onChange={e=>setSq(e.target.value)}
                                onKeyDown={e=>{ if(e.key==='Enter'&&sq.trim()) onSearch(sq); }} />
                        </div>
                    </div>
                    <div className="topnav-right">
                        <div style={{position:'relative'}}>
                            <button className="topnav-create" onClick={() => setShowMenu(!showMenu)}>
                                <Icons.plus /> Create
                            </button>
                            {showMenu && (
                                <div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'#fff',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,.15)',minWidth:200,zIndex:999,overflow:'hidden'}}>
                                    <button style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 16px',border:'none',background:'none',cursor:'pointer',fontSize:14,color:'#172B4D',textAlign:'left'}}
                                        onMouseOver={e=>e.currentTarget.style.background='#f1f2f4'} onMouseOut={e=>e.currentTarget.style.background='none'}
                                        onClick={() => { setShowMenu(false); const sid = spaces && spaces.length ? spaces[0].id : null; if(sid) onNavigate('create-page', sid); else { alert('Create a space first'); onShowCreateSpace(); } }}>
                                        <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><Icons.content /></span> New page
                                    </button>
                                    <button style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 16px',border:'none',background:'none',cursor:'pointer',fontSize:14,color:'#172B4D',textAlign:'left'}}
                                        onMouseOver={e=>e.currentTarget.style.background='#f1f2f4'} onMouseOut={e=>e.currentTarget.style.background='none'}
                                        onClick={() => { setShowMenu(false); onShowCreateSpace(); }}>
                                        <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><Icons.folder /></span> New space
                                    </button>
                                </div>
                            )}
                        </div>
                        <div className="topnav-avatar" style={{background:getAvatarColor(user.avatar_color)}}>
                            {(user.name || 'U').charAt(0).toUpperCase()}
                        </div>
                    </div>
                </div>
            );
        }

        // ===== SIDEBAR =====
        function Sidebar({ spaces, currentSpaceId, tree, onNavigate, onSelectPage, activePageId }) {
            const [expanded, setExpanded] = useState(new Set());
            const currentSpace = Array.isArray(spaces) ? spaces.find(s => s.id === currentSpaceId) : null;
            const user = getUser();

            const toggle = (id) => {
                const n = new Set(expanded);
                n.has(id) ? n.delete(id) : n.add(id);
                setExpanded(n);
            };

            const renderTree = (items, depth=0) => {
                if (!Array.isArray(items)) return null;
                return items.map(item => {
                    const hasKids = Array.isArray(item.children) && item.children.length > 0;
                    const isExpanded = expanded.has(item.id);
                    return (
                        <div key={item.id}>
                            <div className={`tree-item${activePageId===item.id?' active':''}`}
                                style={{paddingLeft: `${12 + depth * 16}px`}}>
                                <div className="tree-toggle" onClick={() => hasKids && toggle(item.id)}>
                                    {hasKids ? (isExpanded ? <Icons.chevronDown /> : <Icons.chevronRight />) : <span style={{width:16}} />}
                                </div>
                                <div className="tree-page-icon"><Icons.page /></div>
                                <div className="tree-page-title" onClick={() => onSelectPage(item.id)}>{item.title}</div>
                                {item.status === 'draft' && <div className="draft-badge">DRAFT</div>}
                            </div>
                            {isExpanded && hasKids && (
                                <div className="tree-children">
                                    {renderTree(item.children, depth + 1)}
                                </div>
                            )}
                        </div>
                    );
                });
            };

            return (
                <div className="sidebar">
                    <div className="sidebar-scroll">
                        {currentSpace ? (
                            <>
                                <div className="sidebar-space-header" onClick={() => onNavigate('space', currentSpaceId)}>
                                    <div className="sidebar-space-icon" style={{background: currentSpace.color || '#0052cc'}}>
                                        {currentSpace.icon || (currentSpace.name || 'S').charAt(0)}
                                    </div>
                                    <div className="sidebar-space-name">{currentSpace.name}</div>
                                </div>
                                <div className="sidebar-section">
                                    <div className="sidebar-section-label">Content</div>
                                    <div className="sidebar-item active">
                                        <div className="sidebar-item-icon"><Icons.content /></div>
                                        <div className="sidebar-item-text">Pages</div>
                                    </div>
                                </div>
                                <div className="sidebar-section" style={{marginTop:4}}>
                                    {renderTree(tree)}
                                </div>
                                <button className="sidebar-create-btn" onClick={() => { const sid = currentSpaceId || (spaces && spaces.length ? spaces[0].id : null); if(sid) onNavigate('create-page', sid); else alert('Create a space first'); }}>
                                    <Icons.plus /> Create page
                                </button>
                            </>
                        ) : (
                            <>
                                {user && (
                                    <div className="sidebar-space-header">
                                        <div className="mini-avatar" style={{background:getAvatarColor(user.avatar_color), width:28, height:28, fontSize:12}}>
                                            {(user.name || 'U').charAt(0).toUpperCase()}
                                        </div>
                                        <div className="sidebar-space-name">{user.name}'s space</div>
                                    </div>
                                )}
                                <div className="sidebar-section">
                                    <div className="sidebar-section-label">Navigation</div>
                                    <div className="sidebar-item" onClick={() => onNavigate('home')}>
                                        <div className="sidebar-item-icon"><Icons.home /></div>
                                        <div className="sidebar-item-text">Overview</div>
                                    </div>
                                    <div className="sidebar-item" onClick={() => onNavigate('recent')}>
                                        <div className="sidebar-item-icon"><Icons.clock /></div>
                                        <div className="sidebar-item-text">Recent</div>
                                    </div>
                                    <div className="sidebar-item" onClick={() => onNavigate('starred')}>
                                        <div className="sidebar-item-icon"><Icons.star /></div>
                                        <div className="sidebar-item-text">Starred</div>
                                    </div>
                                </div>
                                {Array.isArray(spaces) && spaces.length > 0 && (
                                    <div className="sidebar-section">
                                        <div className="sidebar-section-label">Spaces</div>
                                        {spaces.map(sp => (
                                            <div key={sp.id} className={`sidebar-item${currentSpaceId===sp.id?' active':''}`}
                                                onClick={() => onNavigate('space', sp.id)}>
                                                <div className="sidebar-space-icon" style={{background:sp.color||'#0052cc', width:20, height:20, fontSize:10, borderRadius:3}}>
                                                    {sp.icon || (sp.name || 'S').charAt(0)}
                                                </div>
                                                <div className="sidebar-item-text">{sp.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                    <div className="sidebar-footer">
                        <a href="/" className="sidebar-jira-link" target="_self">
                            <Icons.jira /> Jira
                        </a>
                    </div>
                </div>
            );
        }

        // ===== DASHBOARD =====
        function Dashboard({ onNavigate, onSelectPage, onRefreshSpaces }) {
            const [recent, setRecent] = useState([]);
            const [starred, setStarred] = useState([]);
            const [spaces, setSpaces] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showCreate, setShowCreate] = useState(false);

            useEffect(() => {
                Promise.all([api.getRecentPages(), api.getStarredPages(), api.getSpaces()])
                    .then(([r,s,sp]) => {
                        setRecent(Array.isArray(r)?r:[]);
                        setStarred(Array.isArray(s)?s:[]);
                        setSpaces(Array.isArray(sp)?sp:[]);
                        setLoading(false);
                    });
            }, []);

            if (loading) return <div className="loading-spinner">Loading...</div>;

            return (
                <div className="main-scroll">
                    <div className="main-content">
                        {Array.isArray(recent) && recent.length > 0 && (
                            <div className="dash-section">
                                <div className="dash-section-title">Recent pages</div>
                                <div className="dash-cards">
                                    {recent.map(p => (
                                        <div key={p.id} className="dash-card" onClick={() => onSelectPage(p.id)}>
                                            <div className="dash-card-title">{p.title}</div>
                                            <div className="dash-card-meta">
                                                <span>{p.space_name}</span>
                                                <span>{fmtDate(p.updated_at)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {Array.isArray(starred) && starred.length > 0 && (
                            <div className="dash-section">
                                <div className="dash-section-title">Starred</div>
                                <div className="dash-cards">
                                    {starred.map(p => (
                                        <div key={p.id} className="dash-card" onClick={() => onSelectPage(p.id)}>
                                            <div className="dash-card-title">{p.title}</div>
                                            <div className="dash-card-meta"><span>{p.space_name}</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        <div className="dash-section">
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                                <div className="dash-section-title" style={{marginBottom:0}}>All spaces</div>
                                <button className="btn btn-primary" onClick={() => setShowCreate(true)}>
                                    <Icons.plus /> Create space
                                </button>
                            </div>
                            <div className="space-cards">
                                {Array.isArray(spaces) && spaces.map(sp => (
                                    <div key={sp.id} className="space-card" onClick={() => onNavigate('space', sp.id)}>
                                        <div className="space-card-icon" style={{background:sp.color||'#0052cc'}}>{sp.icon||(sp.name || 'S').charAt(0)}</div>
                                        <div className="space-card-name">{sp.name}</div>
                                        <div className="space-card-desc">{sp.description}</div>
                                        <div className="space-card-count">{sp.page_count || 0} pages</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    {showCreate && <CreateSpaceModal onClose={() => setShowCreate(false)} onCreated={(sp) => { setShowCreate(false); if(onRefreshSpaces) onRefreshSpaces(); onNavigate('space', sp.id); }} />}
                </div>
            );
        }

        // ===== CREATE SPACE MODAL =====
        function CreateSpaceModal({ onClose, onCreated }) {
            const [name, setName] = useState('');
            const [key, setKey] = useState('');
            const [desc, setDesc] = useState('');
            const create = () => {
                if (!name.trim()) return;
                api.createSpace({ name, key: key || name.substring(0,4).toUpperCase(), description: desc })
                    .then(sp => onCreated(sp));
            };
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e=>e.stopPropagation()}>
                        <div className="modal-title">Create a space</div>
                        <div className="form-group">
                            <label className="form-label">Space name</label>
                            <input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Engineering" autoFocus />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Space key</label>
                            <input className="form-input" value={key} onChange={e=>setKey(e.target.value)} placeholder="e.g. ENG" />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Description</label>
                            <input className="form-input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What is this space about?" />
                        </div>
                        <div className="modal-footer">
                            <button className="btn" onClick={onClose}>Cancel</button>
                            <button className="btn btn-primary" onClick={create}>Create</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ===== SPACE VIEW =====
        function SpaceView({ spaceId, onNavigate, onSelectPage }) {
            const [space, setSpace] = useState(null);
            const [pages, setPages] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                Promise.all([api.getSpace(spaceId), api.getSpacePages(spaceId)])
                    .then(([s, p]) => {
                        setSpace(s);
                        setPages(Array.isArray(p)?p:[]);
                        setLoading(false);
                    });
            }, [spaceId]);

            if (loading) return <div className="loading-spinner">Loading...</div>;
            if (!space) return null;

            return (
                <div className="main-scroll">
                    <div className="main-content">
                        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
                            <div className="space-card-icon" style={{background:space.color||'#0052cc',width:56,height:56,fontSize:28,borderRadius:8}}>
                                {space.icon||(space.name || 'S').charAt(0)}
                            </div>
                            <div>
                                <div style={{fontSize:24,fontWeight:700,color:'var(--text)'}}>{space.name}</div>
                                <div style={{fontSize:14,color:'var(--text-muted)',marginTop:2}}>{space.description}</div>
                            </div>
                        </div>
                        <div style={{display:'flex',gap:8,marginBottom:24}}>
                            <button className="btn btn-primary" onClick={() => onNavigate('create-page', spaceId)}>
                                <Icons.plus /> Create page
                            </button>
                        </div>
                        <div>
                            <div style={{fontSize:16,fontWeight:600,marginBottom:12}}>Pages</div>
                            {pages.map(p => (
                                <div key={p.id} className="page-list-item" onClick={() => onSelectPage(p.id)}>
                                    <div className="page-list-icon"><Icons.page /></div>
                                    <div className="page-list-info">
                                        <div className="page-list-title">{p.title}</div>
                                        <div className="page-list-meta">Updated {fmtDate(p.updated_at)} by {p.author_name}</div>
                                    </div>
                                </div>
                            ))}
                            {pages.length === 0 && <div className="empty-state"><div className="empty-state-title">No pages yet</div></div>}
                        </div>
                    </div>
                </div>
            );
        }

        // ===== PAGE VIEW =====
        function PageView({ pageId, onNavigate, onSelectPage }) {
            const [page, setPage] = useState(null);
            const [comments, setComments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newComment, setNewComment] = useState('');
            const [liked, setLiked] = useState(false);
            const [likeCount, setLikeCount] = useState(0);

            useEffect(() => {
                setLoading(true);
                Promise.all([api.getPage(pageId), api.getPageComments(pageId)])
                    .then(([p,c]) => {
                        setPage(p); setComments(Array.isArray(c)?c:[]); setLiked(p.liked||false); setLikeCount(p.like_count||0); setLoading(false);
                    });
            }, [pageId]);

            const addComment = () => {
                if (!newComment.trim()) return;
                api.addComment(pageId, { body: newComment }).then(c => { setComments([...comments, c]); setNewComment(''); });
            };
            const handleLike = () => { api.toggleLike(pageId).then(() => { setLiked(!liked); setLikeCount(liked?likeCount-1:likeCount+1); }); };
            const handleStar = () => { api.toggleStar({ page_id: pageId }); };

            if (loading) return <div className="loading-spinner">Loading...</div>;
            if (!page) return null;

            return (
                <div className="main-scroll">
                    <div className="main-content">
                        <div className="breadcrumb">
                            <span className="breadcrumb-link" onClick={() => onNavigate('space', page.space_id)}>{page.space_name}</span>
                            {Array.isArray(page.breadcrumb) && page.breadcrumb.map(c => (
                                <React.Fragment key={c.id}>
                                    <span className="breadcrumb-sep">/</span>
                                    <span className="breadcrumb-link" onClick={() => onSelectPage(c.id)}>{c.title}</span>
                                </React.Fragment>
                            ))}
                            <span className="breadcrumb-sep">/</span>
                            <span>{page.title}</span>
                        </div>

                        <div className="page-title-view">{page.title}</div>
                        <div className="page-meta-bar">
                            <div className="page-meta-author">
                                <div className="mini-avatar" style={{background:getAvatarColor(page.author_color)}}>
                                    {(page.author_name || 'A').charAt(0).toUpperCase()}
                                </div>
                                <span style={{fontWeight:500}}>{page.author_name}</span>
                            </div>
                            <span>Updated {fmtDate(page.updated_at)}</span>
                            <span>v{page.version || 1}</span>
                        </div>
                        <div className="page-actions-bar">
                            <button className="btn" onClick={handleLike}>
                                <Icons.heart /> {likeCount}
                            </button>
                            <button className="btn" onClick={handleStar}>
                                <Icons.star /> Star
                            </button>
                            <button className="btn" onClick={() => onNavigate('edit-page', pageId)}>
                                <Icons.edit /> Edit
                            </button>
                            <button className="btn" onClick={() => onNavigate('history', pageId)}>
                                <Icons.clock /> History
                            </button>
                            <button className="btn btn-subtle">
                                <Icons.share /> Share
                            </button>
                        </div>

                        {Array.isArray(page.labels) && page.labels.length > 0 && (
                            <div className="labels">
                                {page.labels.map(l => <span key={l} className="label-tag">{l}</span>)}
                            </div>
                        )}

                        <div className="page-body" dangerouslySetInnerHTML={{ __html: page.body }} />

                        {Array.isArray(page.children) && page.children.length > 0 && (
                            <div style={{marginTop:32,borderTop:'1px solid var(--border)',paddingTop:20}}>
                                <div style={{fontSize:16,fontWeight:600,marginBottom:12}}>Child pages</div>
                                {page.children.map(ch => (
                                    <div key={ch.id} className="page-list-item" onClick={() => onSelectPage(ch.id)}>
                                        <div className="page-list-icon"><Icons.page /></div>
                                        <div className="page-list-info"><div className="page-list-title">{ch.title}</div></div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="comments-section">
                            <div className="comments-title">Comments ({comments.length})</div>
                            <div className="comment-input-area">
                                <textarea placeholder="Add a comment..." value={newComment} onChange={e=>setNewComment(e.target.value)} />
                                <div style={{marginTop:8}}>
                                    <button className="btn btn-primary" onClick={addComment}>Save</button>
                                </div>
                            </div>
                            {Array.isArray(comments) && comments.map(c => (
                                <div key={c.id} className="comment-box" style={{marginLeft: c.parent_id ? 40 : 0}}>
                                    <div className="comment-avatar" style={{background:getAvatarColor(c.author_color)}}>
                                        {(c.author_name || 'A').charAt(0).toUpperCase()}
                                    </div>
                                    <div className="comment-content">
                                        <div className="comment-header">
                                            <span className="comment-author">{c.author_name}</span>
                                            <span className="comment-time">{fmtDateTime(c.created_at)}</span>
                                        </div>
                                        <div className="comment-body">{c.body}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ===== PAGE EDITOR (Confluence-style) =====
        /* Toolbar popup styles */
        const tbPopupStyle = {position:'absolute',top:'100%',left:0,marginTop:4,background:'#fff',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,.18)',zIndex:999,padding:8,minWidth:220};
        const tbPopupInputStyle = {width:'100%',padding:'6px 8px',border:'1px solid #dfe1e6',borderRadius:4,fontSize:13,marginBottom:6,outline:'none',boxSizing:'border-box'};
        const tbPopupBtnStyle = {padding:'6px 14px',borderRadius:4,border:'none',cursor:'pointer',fontSize:13,fontWeight:600};

        const EMOJIS = ['😀','😂','😍','🤔','👍','👎','🎉','🔥','💡','✅','❌','⚠️','📌','📎','💬','🚀','⭐','❤️','👋','🙏','💪','🎯','📝','🔗','📊','📅','🏆','💻','🐛','🔧','📦','🌟','😊','🤝','✨','🎨','📐','🧪','📈','📉'];

        function ToolbarPopup({ children, onClose }) {
            const ref = useRef(null);
            useEffect(() => {
                const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [onClose]);
            return <div ref={ref} style={tbPopupStyle} onClick={e=>e.stopPropagation()}>{children}</div>;
        }

        function PageEditor({ pageId, spaceId, onNavigate }) {
            const [page, setPage] = useState(null);
            const [title, setTitle] = useState('');
            const [loading, setLoading] = useState(!!pageId);
            const [saved, setSaved] = useState(true);
            const editorRef = useRef(null);
            const [popup, setPopup] = useState(null); // 'link','image','table','mention','emoji','align','code'
            const [linkUrl, setLinkUrl] = useState('');
            const [linkText, setLinkText] = useState('');
            const [imgUrl, setImgUrl] = useState('');
            const [tableRows, setTableRows] = useState(3);
            const [tableCols, setTableCols] = useState(3);
            const [mentionSearch, setMentionSearch] = useState('');
            const [users, setUsers] = useState([]);
            const savedSelection = useRef(null);

            useEffect(() => {
                if (pageId) {
                    api.getPage(pageId).then(d => { setPage(d); setTitle(d.title); setLoading(false); });
                } else { setLoading(false); }
            }, [pageId]);

            useEffect(() => {
                if (!loading && editorRef.current && page) {
                    editorRef.current.innerHTML = page.body || '';
                }
            }, [loading, page]);

            // Fetch users for mentions
            useEffect(() => {
                fetch(`${API}/users`, { headers: getAuthHeaders() }).then(r=>r.json()).then(d => { if(Array.isArray(d)) setUsers(d); }).catch(()=>{});
            }, []);

            const saveSelection = () => {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) savedSelection.current = sel.getRangeAt(0).cloneRange();
            };
            const restoreSelection = () => {
                if (savedSelection.current) {
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(savedSelection.current);
                }
            };

            const exec = (cmd, val=null) => { document.execCommand(cmd, false, val); editorRef.current && editorRef.current.focus(); setSaved(false); };

            const handleHeading = (e) => {
                const v = e.target.value;
                if (v === 'p') exec('formatBlock', 'p');
                else exec('formatBlock', v);
            };

            const openPopup = (name) => {
                saveSelection();
                setPopup(popup === name ? null : name);
                if (name === 'link') { setLinkUrl(''); setLinkText(''); }
                if (name === 'image') setImgUrl('');
                if (name === 'table') { setTableRows(3); setTableCols(3); }
                if (name === 'mention') setMentionSearch('');
            };
            const closePopup = () => setPopup(null);

            const insertLink = () => {
                if (!linkUrl.trim()) return;
                restoreSelection();
                const sel = window.getSelection();
                if (linkText.trim() && sel.isCollapsed) {
                    exec('insertHTML', `<a href="${linkUrl}" target="_blank">${linkText}</a>`);
                } else {
                    exec('createLink', linkUrl);
                }
                closePopup();
            };

            const insertImage = () => {
                if (!imgUrl.trim()) return;
                restoreSelection();
                exec('insertImage', imgUrl);
                closePopup();
            };

            const insertTable = () => {
                const r = Math.max(1, Math.min(10, tableRows));
                const c = Math.max(1, Math.min(10, tableCols));
                const cellStyle = 'border:1px solid #dfe1e6;padding:8px;min-width:60px';
                let html = '<table style="width:100%;border-collapse:collapse;margin:12px 0">';
                for (let i = 0; i < r; i++) {
                    html += '<tr>';
                    for (let j = 0; j < c; j++) {
                        if (i === 0) html += `<th style="${cellStyle};background:#f4f5f7;font-weight:600">Header</th>`;
                        else html += `<td style="${cellStyle}">Cell</td>`;
                    }
                    html += '</tr>';
                }
                html += '</table><p><br/></p>';
                restoreSelection();
                exec('insertHTML', html);
                closePopup();
            };

            const insertMention = (user) => {
                restoreSelection();
                exec('insertHTML', `<span style="background:#deebff;color:#0052cc;padding:1px 4px;border-radius:3px;font-weight:500" contenteditable="false">@${user.name}</span>&nbsp;`);
                closePopup();
            };

            const insertEmoji = (em) => {
                restoreSelection();
                exec('insertHTML', em);
                closePopup();
            };

            const insertCodeBlock = () => {
                restoreSelection();
                exec('insertHTML', '<pre style="background:#f4f5f7;border:1px solid #dfe1e6;border-radius:4px;padding:12px 16px;font-family:monospace;font-size:13px;overflow-x:auto;margin:12px 0"><code>// code here</code></pre><p><br/></p>');
                closePopup();
            };

            const insertInlineCode = () => {
                restoreSelection();
                const sel = window.getSelection();
                if (sel.toString().trim()) {
                    exec('insertHTML', `<code style="background:#f4f5f7;padding:2px 4px;border-radius:3px;font-family:monospace;font-size:0.9em">${sel.toString()}</code>`);
                } else {
                    exec('insertHTML', '<code style="background:#f4f5f7;padding:2px 4px;border-radius:3px;font-family:monospace;font-size:0.9em">code</code>&nbsp;');
                }
                closePopup();
            };

            const handlePublish = () => {
                if (!title.trim()) { alert('Title is required'); return; }
                const html = (editorRef.current && editorRef.current.innerHTML) || '';
                if (pageId) {
                    api.savePage(pageId, { title, body: html, change_message: '' }).then(() => {
                        setSaved(true); onNavigate('page', pageId);
                    });
                } else {
                    api.createPage(spaceId, { title, body: html }).then(np => {
                        onNavigate('page', np.id);
                    });
                }
            };

            const handleClose = () => {
                if (pageId) onNavigate('page', pageId);
                else if (spaceId) onNavigate('space', spaceId);
                else onNavigate('home');
            };

            const filteredUsers = users.filter(u => !mentionSearch || u.name.toLowerCase().includes(mentionSearch.toLowerCase()));

            if (loading) return <div className="loading-spinner">Loading...</div>;

            return (
                <div className="main" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 56px)'}}>
                    {/* Editor top bar */}
                    <div className="editor-topbar">
                        <div className="editor-topbar-left">
                            <div className="editor-saved-status">
                                {saved ? <><Icons.check /> Saved</> : 'Unsaved changes'}
                            </div>
                        </div>
                        <div className="editor-topbar-right">
                            <button className="btn btn-subtle" onClick={handleClose}><Icons.close /> Close</button>
                            <button className="btn btn-subtle"><Icons.share /> Share</button>
                            <button className="btn btn-primary" onClick={handlePublish}>Publish</button>
                        </div>
                    </div>

                    {/* Toolbar */}
                    <div className="editor-toolbar">
                        <select className="tb-select" onChange={handleHeading} defaultValue="p">
                            <option value="p">Normal text</option>
                            <option value="h1">Heading 1</option>
                            <option value="h2">Heading 2</option>
                            <option value="h3">Heading 3</option>
                        </select>
                        <div className="tb-sep" />
                        <button className="tb-btn" onClick={() => exec('bold')} title="Bold (Ctrl+B)"><Icons.bold /></button>
                        <button className="tb-btn" onClick={() => exec('italic')} title="Italic (Ctrl+I)"><Icons.italic /></button>
                        <button className="tb-btn" onClick={() => exec('underline')} title="Underline (Ctrl+U)"><Icons.underline /></button>
                        <div className="tb-sep" />
                        <button className="tb-btn" onClick={() => exec('insertUnorderedList')} title="Bullet list"><Icons.listBullet /></button>
                        <button className="tb-btn" onClick={() => exec('insertOrderedList')} title="Numbered list"><Icons.listNumber /></button>
                        <div className="tb-sep" />
                        {/* Alignment dropdown */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('align')} title="Text alignment"><Icons.alignLeft /></button>
                            {popup === 'align' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <div style={{display:'flex',gap:2,minWidth:'auto',padding:0}}>
                                        <button className="tb-btn" onClick={() => { restoreSelection(); exec('justifyLeft'); closePopup(); }} title="Left">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
                                        </button>
                                        <button className="tb-btn" onClick={() => { restoreSelection(); exec('justifyCenter'); closePopup(); }} title="Center">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="18" y1="14" x2="6" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
                                        </button>
                                        <button className="tb-btn" onClick={() => { restoreSelection(); exec('justifyRight'); closePopup(); }} title="Right">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="7" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
                                        </button>
                                    </div>
                                </ToolbarPopup>
                            )}
                        </div>
                        <div className="tb-sep" />
                        {/* Link popup */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('link')} title="Insert link"><Icons.link /></button>
                            {popup === 'link' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <div style={{fontSize:12,fontWeight:600,color:'#626f86',marginBottom:6}}>Insert link</div>
                                    <input style={tbPopupInputStyle} placeholder="Display text (optional)" value={linkText} onChange={e=>setLinkText(e.target.value)} autoFocus />
                                    <input style={tbPopupInputStyle} placeholder="https://example.com" value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')insertLink()}} />
                                    <div style={{display:'flex',justifyContent:'flex-end',gap:6,marginTop:2}}>
                                        <button style={{...tbPopupBtnStyle,background:'#f1f2f4',color:'#172B4D'}} onClick={closePopup}>Cancel</button>
                                        <button style={{...tbPopupBtnStyle,background:'#0c66e4',color:'#fff'}} onClick={insertLink}>Insert</button>
                                    </div>
                                </ToolbarPopup>
                            )}
                        </div>
                        {/* Image popup */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('image')} title="Insert image"><Icons.image /></button>
                            {popup === 'image' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <div style={{fontSize:12,fontWeight:600,color:'#626f86',marginBottom:6}}>Insert image</div>
                                    <input style={tbPopupInputStyle} placeholder="Image URL (https://...)" value={imgUrl} onChange={e=>setImgUrl(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter')insertImage()}} />
                                    {imgUrl && <div style={{marginBottom:6}}><img src={imgUrl} style={{maxWidth:'100%',maxHeight:100,borderRadius:4,border:'1px solid #dfe1e6'}} onError={e=>e.target.style.display='none'} /></div>}
                                    <div style={{display:'flex',justifyContent:'flex-end',gap:6}}>
                                        <button style={{...tbPopupBtnStyle,background:'#f1f2f4',color:'#172B4D'}} onClick={closePopup}>Cancel</button>
                                        <button style={{...tbPopupBtnStyle,background:'#0c66e4',color:'#fff'}} onClick={insertImage}>Insert</button>
                                    </div>
                                </ToolbarPopup>
                            )}
                        </div>
                        {/* Table popup */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('table')} title="Insert table"><Icons.table /></button>
                            {popup === 'table' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <div style={{fontSize:12,fontWeight:600,color:'#626f86',marginBottom:6}}>Insert table</div>
                                    <div style={{display:'flex',gap:8,marginBottom:8}}>
                                        <label style={{fontSize:12,flex:1}}>Rows<input type="number" min="1" max="10" value={tableRows} onChange={e=>setTableRows(+e.target.value)} style={{...tbPopupInputStyle,marginBottom:0,marginTop:2}} /></label>
                                        <label style={{fontSize:12,flex:1}}>Columns<input type="number" min="1" max="10" value={tableCols} onChange={e=>setTableCols(+e.target.value)} style={{...tbPopupInputStyle,marginBottom:0,marginTop:2}} /></label>
                                    </div>
                                    {/* Visual grid preview */}
                                    <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(tableCols,10)},1fr)`,gap:2,marginBottom:8}}>
                                        {Array.from({length:Math.min(tableRows,10)*Math.min(tableCols,10)}).map((_,i)=>(
                                            <div key={i} style={{height:14,background:i<Math.min(tableCols,10)?'#deebff':'#f4f5f7',borderRadius:2,border:'1px solid #dfe1e6'}}/>
                                        ))}
                                    </div>
                                    <div style={{display:'flex',justifyContent:'flex-end',gap:6}}>
                                        <button style={{...tbPopupBtnStyle,background:'#f1f2f4',color:'#172B4D'}} onClick={closePopup}>Cancel</button>
                                        <button style={{...tbPopupBtnStyle,background:'#0c66e4',color:'#fff'}} onClick={insertTable}>Insert</button>
                                    </div>
                                </ToolbarPopup>
                            )}
                        </div>
                        <div className="tb-sep" />
                        {/* Code dropdown */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('code')} title="Insert code"><Icons.code /></button>
                            {popup === 'code' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <button style={{display:'block',width:'100%',padding:'8px 10px',border:'none',background:'none',cursor:'pointer',borderRadius:4,fontSize:13,textAlign:'left',color:'#172B4D'}} onMouseOver={e=>e.currentTarget.style.background='#f1f2f4'} onMouseOut={e=>e.currentTarget.style.background='none'} onClick={insertInlineCode}>
                                        <span style={{fontFamily:'monospace',background:'#f4f5f7',padding:'1px 4px',borderRadius:3,fontSize:12}}>code</span> Inline code
                                    </button>
                                    <button style={{display:'block',width:'100%',padding:'8px 10px',border:'none',background:'none',cursor:'pointer',borderRadius:4,fontSize:13,textAlign:'left',color:'#172B4D'}} onMouseOver={e=>e.currentTarget.style.background='#f1f2f4'} onMouseOut={e=>e.currentTarget.style.background='none'} onClick={insertCodeBlock}>
                                        <span style={{fontFamily:'monospace',background:'#f4f5f7',padding:'2px 6px',borderRadius:3,fontSize:11}}>{'{ }'}</span> Code block
                                    </button>
                                </ToolbarPopup>
                            )}
                        </div>
                        <button className="tb-btn" onClick={() => exec('insertHorizontalRule')} title="Divider"><Icons.hr /></button>
                        {/* Mention popup */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('mention')} title="Mention someone"><Icons.mention /></button>
                            {popup === 'mention' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <div style={{fontSize:12,fontWeight:600,color:'#626f86',marginBottom:6}}>Mention a person</div>
                                    <input style={tbPopupInputStyle} placeholder="Search people..." value={mentionSearch} onChange={e=>setMentionSearch(e.target.value)} autoFocus />
                                    <div style={{maxHeight:160,overflowY:'auto'}}>
                                        {filteredUsers.length === 0 && <div style={{fontSize:12,color:'#626f86',padding:4}}>No users found</div>}
                                        {filteredUsers.map(u => (
                                            <button key={u.id} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'6px 8px',border:'none',background:'none',cursor:'pointer',borderRadius:4,fontSize:13,color:'#172B4D'}} onMouseOver={e=>e.currentTarget.style.background='#f1f2f4'} onMouseOut={e=>e.currentTarget.style.background='none'} onClick={() => insertMention(u)}>
                                                <div style={{width:24,height:24,borderRadius:'50%',background:u.avatar_color||'#0052cc',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:700,flexShrink:0}}>{(u.name||'?')[0].toUpperCase()}</div>
                                                <span>{u.name}</span>
                                                <span style={{marginLeft:'auto',fontSize:11,color:'#626f86'}}>{u.role}</span>
                                            </button>
                                        ))}
                                    </div>
                                </ToolbarPopup>
                            )}
                        </div>
                        {/* Emoji popup */}
                        <div style={{position:'relative'}}>
                            <button className="tb-btn" onClick={() => openPopup('emoji')} title="Insert emoji"><Icons.emoji /></button>
                            {popup === 'emoji' && (
                                <ToolbarPopup onClose={closePopup}>
                                    <div style={{fontSize:12,fontWeight:600,color:'#626f86',marginBottom:6}}>Insert emoji</div>
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:2}}>
                                        {EMOJIS.map(em => (
                                            <button key={em} style={{width:32,height:32,border:'none',background:'none',cursor:'pointer',borderRadius:4,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}} onMouseOver={e=>e.currentTarget.style.background='#f1f2f4'} onMouseOut={e=>e.currentTarget.style.background='none'} onClick={() => insertEmoji(em)}>{em}</button>
                                        ))}
                                    </div>
                                </ToolbarPopup>
                            )}
                        </div>
                    </div>

                    {/* Editor body */}
                    <div style={{flex:1,overflowY:'auto'}}>
                        <input className="editor-title-input" value={title} onChange={e=>{setTitle(e.target.value);setSaved(false);}}
                            placeholder="Give this page a title..." />
                        <div ref={editorRef} className="editor-body" contentEditable suppressContentEditableWarning
                            onInput={() => setSaved(false)}
                        />
                    </div>
                </div>
            );
        }

        // ===== PAGE HISTORY =====
        function PageHistory({ pageId, onNavigate }) {
            const [versions, setVersions] = useState([]);
            const [sel, setSel] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                api.getPageVersions(pageId).then(d => { setVersions(Array.isArray(d)?d:[]); setLoading(false); });
            }, [pageId]);

            if (loading) return <div className="loading-spinner">Loading...</div>;

            return (
                <div className="main-scroll">
                    <div className="main-content">
                        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
                            <button className="btn" onClick={() => onNavigate('page', pageId)}>Back to page</button>
                            <div style={{fontSize:20,fontWeight:700}}>Version history</div>
                        </div>
                        <div className="version-grid">
                            <div>
                                {versions.map(v => (
                                    <div key={v.version} className={`version-list-item${sel && sel.version===v.version?' active':''}`}
                                        onClick={() => setSel(v)}>
                                        <div style={{fontSize:14,fontWeight:600}}>Version {v.version}</div>
                                        <div style={{fontSize:12,color:'var(--text-muted)'}}>by {v.editor_name}</div>
                                        <div style={{fontSize:12,color:'var(--text-muted)'}}>{fmtDateTime(v.created_at)}</div>
                                        {v.change_message && <div style={{fontSize:12,color:'var(--text-subtle)',marginTop:2}}>{v.change_message}</div>}
                                    </div>
                                ))}
                            </div>
                            <div>
                                {sel ? (
                                    <>
                                        <div style={{fontSize:16,fontWeight:600,marginBottom:12}}>Version {sel.version}</div>
                                        <div className="page-body" dangerouslySetInnerHTML={{ __html: sel.body }} />
                                    </>
                                ) : (
                                    <div className="empty-state"><div className="empty-state-title">Select a version to preview</div></div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ===== SEARCH RESULTS =====
        function SearchResults({ query, onSelectPage }) {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                api.search(query).then(d => { setResults(Array.isArray(d)?d:[]); setLoading(false); });
            }, [query]);
            if (loading) return <div className="loading-spinner">Searching...</div>;
            return (
                <div className="main-scroll">
                    <div className="main-content">
                        <div style={{fontSize:20,fontWeight:700,marginBottom:20}}>Search results for "{query}"</div>
                        {results.length === 0 ? (
                            <div className="empty-state"><div className="empty-state-icon">🔍</div><div className="empty-state-title">No results found</div></div>
                        ) : results.map(r => (
                            <div key={r.id} className="search-result" onClick={() => onSelectPage(r.id)}>
                                <div className="search-result-title">{r.title}</div>
                                <div className="search-result-meta">{r.space_name}</div>
                                {r.snippet && <div className="search-result-snippet">{r.snippet}</div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ===== TEMPLATES VIEW =====
        function TemplatesView({ onNavigate }) {
            const [templates, setTemplates] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                api.getTemplates().then(d => { setTemplates(Array.isArray(d)?d:[]); setLoading(false); });
            }, []);
            if (loading) return <div className="loading-spinner">Loading...</div>;
            return (
                <div className="main-scroll">
                    <div className="main-content">
                        <div style={{fontSize:20,fontWeight:700,marginBottom:20}}>Templates</div>
                        <div className="dash-cards">
                            {templates.map(t => (
                                <div key={t.id} className="dash-card">
                                    <div className="dash-card-title">{t.title}</div>
                                    <div className="dash-card-meta"><span>{t.description}</span></div>
                                </div>
                            ))}
                        </div>
                        {templates.length===0 && <div className="empty-state"><div className="empty-state-title">No templates available</div></div>}
                    </div>
                </div>
            );
        }

        // ===== MAIN APP =====
        function App() {
            const [view, setView] = useState('home');
            const [viewParam, setViewParam] = useState(null);
            const [spaces, setSpaces] = useState([]);
            const [tree, setTree] = useState([]);
            const [currentSpaceId, setCurrentSpaceId] = useState(null);
            const [showCreateSpace, setShowCreateSpace] = useState(false);

            const user = getUser();

            const refreshSpaces = useCallback(() => {
                api.getSpaces().then(d => { if(Array.isArray(d)) setSpaces(d); });
            }, []);

            useEffect(() => {
                refreshSpaces();
            }, []);

            const navigate = useCallback((v, param) => {
                setView(v);
                setViewParam(param || null);
                if (v === 'space' && param) {
                    setCurrentSpaceId(param);
                    api.getSpaceTree(param).then(d => { if(Array.isArray(d)) setTree(d); });
                } else if (v === 'page' && param) {
                    // keep current space
                } else if (v === 'create-page' && param) {
                    setCurrentSpaceId(param);
                    api.getSpaceTree(param).then(d => { if(Array.isArray(d)) setTree(d); });
                } else if (v === 'home' || v === 'recent' || v === 'starred' || v === 'search') {
                    setCurrentSpaceId(null);
                    setTree([]);
                }
            }, []);

            const selectPage = useCallback((pid) => {
                navigate('page', pid);
            }, [navigate]);

            const handleSearch = useCallback((q) => {
                navigate('search', q);
            }, [navigate]);

            if (!user) return (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,fontFamily:'var(--font)'}}>
                    <div style={{fontSize:48}}>🔒</div>
                    <h2 style={{color:'#172B4D'}}>Please log in to Atlas first</h2>
                    <p style={{color:'#626f86'}}>You need to be signed in to access Atlas Wiki.</p>
                    <a href="/" style={{padding:'8px 24px',background:'#0c66e4',color:'#fff',borderRadius:4,fontWeight:600,textDecoration:'none'}}>Go to Atlas Login</a>
                </div>
            );

            const isEditor = view === 'edit-page' || view === 'create-page';

            return (
                <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
                    <TopNav onNavigate={navigate} onSearch={handleSearch} spaces={spaces} onShowCreateSpace={() => setShowCreateSpace(true)} />
                    <div className="app-layout">
                        {!isEditor && (
                            <Sidebar spaces={spaces} currentSpaceId={currentSpaceId} tree={tree}
                                onNavigate={navigate} onSelectPage={selectPage} activePageId={view==='page'?viewParam:null} />
                        )}
                        {view === 'home' && <Dashboard onNavigate={navigate} onSelectPage={selectPage} onRefreshSpaces={refreshSpaces} />}
                        {view === 'recent' && <Dashboard onNavigate={navigate} onSelectPage={selectPage} onRefreshSpaces={refreshSpaces} />}
                        {view === 'starred' && <Dashboard onNavigate={navigate} onSelectPage={selectPage} onRefreshSpaces={refreshSpaces} />}

                        {view === 'space' && viewParam && <SpaceView spaceId={viewParam} onNavigate={navigate} onSelectPage={selectPage} />}
                        {view === 'page' && viewParam && <PageView pageId={viewParam} onNavigate={navigate} onSelectPage={selectPage} />}
                        {view === 'edit-page' && viewParam && <PageEditor pageId={viewParam} onNavigate={navigate} />}
                        {view === 'create-page' && viewParam && <PageEditor spaceId={viewParam} onNavigate={navigate} />}
                        {view === 'history' && viewParam && <PageHistory pageId={viewParam} onNavigate={navigate} />}
                        {view === 'search' && viewParam && <SearchResults query={viewParam} onSelectPage={selectPage} />}
                    </div>
                    {showCreateSpace && <CreateSpaceModal onClose={() => setShowCreateSpace(false)} onCreated={(sp) => { setShowCreateSpace(false); refreshSpaces(); navigate('space', sp.id); }} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
